<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Almosafer — Rides flow · all screens</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  html, body { margin: 0; padding: 0; }
  .screen-frame {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #F7F9FA;
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
  const { useState } = React;

  const screens = [
    { id: 'landing', label: '01 · Landing',         file: 'Rides Landing - Desktop.html' },
    { id: 'step2',   label: '02 · Flight details',  file: 'Rides Step 2 - Flight Details.html' },
    { id: 'step3',   label: '03 · Confirm',         file: 'Rides Step 3 - Confirm.html' },
    { id: 'step4',   label: '04 · Pick a car',      file: 'Rides Step 4 - Pick a Car.html' },
  ];

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="rides-flow-a"
          title="Rides · flow A"
          subtitle="Airport pickup · landing → flight → confirm → cars"
        >
          {screens.map(s => (
            <DCArtboard
              key={s.id}
              id={s.id}
              label={s.label}
              width={1440}
              height={1200}
            >
              <iframe
                className="screen-frame"
                src={s.file}
                title={s.label}
                loading="lazy"
              />
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
